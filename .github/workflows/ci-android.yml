name: Android - CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Init Dawn submodule
      run: git -C PreVEngine/external/gfx submodule update --init third_party/dawn

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Android SDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27
        link-to-sdk: true

    - name: Install dependencies
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt update
        sudo apt-get install -y vulkan-sdk

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Compile Shaders
      run: |
        python3 Scripts/compile_shaders.py --spirv --max-view-count 1

    - name: Configure CMake
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DANDROID=ON \
        -DANDROID_ABI=arm64-v8a \
        -S ${{ github.workspace }}

    - name: Build
      run: |
        cd Examples/PreVEngineExample/platform/android
        chmod a+x gradlew
        ./gradlew clean assembleDebug

    - name: Create Artifact
      run: |
        mkdir build-android-arm64-v8a
        cp Examples/PreVEngineExample/platform/android/app/build/outputs/apk/debug/app-debug.apk build-android-arm64-v8a

    - name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-android-arm64-v8a
        path: build-android-arm64-v8a
        retention-days: 7

