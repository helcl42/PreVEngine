name: Android - CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SLANG_VERSION: "2026.9.1"

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Init Dawn submodule
      run: git -C PreVEngine/external/gfx submodule update --init third_party/dawn

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Android SDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27
        link-to-sdk: true

    - name: Install dependencies
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt update
        sudo apt-get install -y vulkan-sdk

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install Slang
      run: |
        wget -q https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64-glibc-2.28.tar.gz -O slang.tar.gz
        mkdir -p $HOME/slang && tar -xzf slang.tar.gz -C $HOME/slang
        echo "$HOME/slang/bin" >> $GITHUB_PATH

    - name: Compile Shaders
      run: |
        python3 Scripts/compile_shaders.py --spirv --max-view-count 1

    - name: Build
      run: |
        cd Examples/PreVEngineExample/platform/android
        chmod a+x gradlew
        ./gradlew clean assembleDebug

    - name: Create Artifact
      run: |
        mkdir example-android-arm64-v8a
        cp Examples/PreVEngineExample/platform/android/app/build/outputs/apk/debug/app-debug.apk example-android-arm64-v8a

    - name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
        name: example-android-arm64-v8a
        path: example-android-arm64-v8a
        retention-days: 7

    - name: Build Sandbox
      run: |
        cd Examples/Sandbox/platform/android
        chmod a+x gradlew
        ./gradlew clean assembleDebug

    - name: Create Sandbox Artifact
      run: |
        mkdir sandbox-android-arm64-v8a
        cp Examples/Sandbox/platform/android/app/build/outputs/apk/debug/app-debug.apk sandbox-android-arm64-v8a/Sandbox-debug.apk

    - name: Publish Sandbox Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sandbox-android-arm64-v8a
        path: sandbox-android-arm64-v8a
        retention-days: 7

