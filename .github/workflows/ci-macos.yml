name: macOS - CI Build/Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        include:
          - c_compiler: clang
            cpp_compiler: clang++

    env:
      VULKAN_VERSION: 1.3.290.0
      SLANG_VERSION: "2026.9.1"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Init Dawn submodule
      run: git -C PreVEngine/external/gfx submodule update --init third_party/dawn

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: brew install ninja

    - name: Install Vulkan SDK
      run: |
        wget "https://sdk.lunarg.com/sdk/download/$VULKAN_VERSION/mac/vulkansdk-macos-$VULKAN_VERSION.dmg?Human=true" -O vulkansdk.dmg
        hdiutil attach vulkansdk.dmg
        sudo /Volumes/vulkansdk-macos-$VULKAN_VERSION/InstallVulkan.app/Contents/MacOS/InstallVulkan --root $GITHUB_WORKSPACE/vulkansdk-macos-$VULKAN_VERSION --accept-licenses --default-answer --confirm-command install
        hdiutil detach /Volumes/vulkansdk-macos-$VULKAN_VERSION 2>/dev/null || true
        echo "VULKAN_SDK_PATH=$GITHUB_WORKSPACE/vulkansdk-macos-$VULKAN_VERSION" >> $GITHUB_ENV
        echo "VULKAN_SDK=$GITHUB_WORKSPACE/vulkansdk-macos-$VULKAN_VERSION/macOS" >> $GITHUB_ENV

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install Slang
      run: |
        wget -q https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-macos-aarch64.tar.gz -O slang.tar.gz
        mkdir -p $HOME/slang && tar -xzf slang.tar.gz -C $HOME/slang
        echo "$HOME/slang/bin" >> $GITHUB_PATH

    - name: Compile Shaders
      run: |
        python3 Scripts/compile_shaders.py --max-view-count 1

    - name: Configure CMake
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
        -G Ninja \
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Create Artifact
      run: |
        mkdir example-macos
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/assets example-macos
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/PreVEngineExample example-macos
        cp -r $VULKAN_SDK/lib/libvulkan*.dylib example-macos

    - name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
        name: example-macos
        path: example-macos
        retention-days: 7

    - name: Create Sandbox Artifact
      run: |
        mkdir sandbox-macos
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/Sandbox/assets sandbox-macos
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/Sandbox/Sandbox sandbox-macos
        cp -r $VULKAN_SDK/lib/libvulkan*.dylib sandbox-macos

    - name: Publish Sandbox Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sandbox-macos
        path: sandbox-macos
        retention-days: 7

    - name: Run Tests
      run: |
        cd ${{ steps.strings.outputs.build-output-dir }}/PreVEngineTests
        ./PreVEngineTests

