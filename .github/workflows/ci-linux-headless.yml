name: Linux Headless - CI Build/Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SLANG_VERSION: "2026.9.1"

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
          - compiler: clang
            c_compiler: clang
            cpp_compiler: clang++

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Init Dawn submodule
      run: git -C PreVEngine/external/gfx submodule update --init third_party/dawn

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # Headless build: BUILD_HEADLESS drops windowing, so no X11/XCB/Wayland dev packages are needed.
    # (vulkan-sdk pulls whatever it needs transitively.) This job proves the windowing-free build.
    - name: Install dependencies
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt update
        sudo apt-get install -y libdbus-1-3 vulkan-sdk libminizip-dev libstdc++6 libc6-dev build-essential ninja-build

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install Slang
      run: |
        wget -q https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64-glibc-2.28.tar.gz -O slang.tar.gz
        mkdir -p $HOME/slang && tar -xzf slang.tar.gz -C $HOME/slang
        echo "$HOME/slang/bin" >> $GITHUB_PATH

    - name: Compile Shaders
      run: |
        python3 Scripts/compile_shaders.py --spirv

    - name: Configure CMake
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
        -G Ninja \
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DBUILD_HEADLESS=ON \
        -DBUILD_WEBGPU_BACKEND=OFF \
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Create Artifact
      run: |
        mkdir example-linux-headless-${{ matrix.compiler }}
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/assets example-linux-headless-${{ matrix.compiler }}
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/PreVEngineExample example-linux-headless-${{ matrix.compiler }}

    - name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
        name: example-linux-headless-${{ matrix.compiler }}
        path: example-linux-headless-${{ matrix.compiler }}
        retention-days: 7

    - name: Create Sandbox Artifact
      run: |
        mkdir sandbox-linux-headless-${{ matrix.compiler }}
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/Sandbox/assets sandbox-linux-headless-${{ matrix.compiler }}
        cp -r ${{ steps.strings.outputs.build-output-dir }}/Examples/Sandbox/Sandbox sandbox-linux-headless-${{ matrix.compiler }}

    - name: Publish Sandbox Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sandbox-linux-headless-${{ matrix.compiler }}
        path: sandbox-linux-headless-${{ matrix.compiler }}
        retention-days: 7

    # No xvfb: a headless build creates no window/surface, so the tests need no display server.
    - name: Run Tests
      run: |
        cd ${{ steps.strings.outputs.build-output-dir }}/PreVEngineTests
        ./PreVEngineTests
