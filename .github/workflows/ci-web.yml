name: Web - CI Build

on:
  push:
    branches: [ "master", "gfx" ]
  pull_request:
    branches: [ "master", "gfx" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SLANG_VERSION: "2026.9.1"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Init Dawn submodule
      run: git -C PreVEngine/external/gfx submodule update --init third_party/dawn

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 'latest'

    - name: Install Slang
      run: |
        wget -q https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64-glibc-2.28.tar.gz -O slang.tar.gz
        mkdir -p $HOME/slang && tar -xzf slang.tar.gz -C $HOME/slang
        echo "$HOME/slang/bin" >> $GITHUB_PATH

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build_web" >> "$GITHUB_OUTPUT"

    - name: Compile Shaders
      run: |
        python3 Scripts/compile_shaders.py --max-view-count 1

    - name: Configure CMake
      run: |
        emcmake cmake -B ${{ steps.strings.outputs.build-output-dir }} \
        -DCMAKE_BUILD_TYPE=Release \
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

    - name: Create Artifact
      run: |
        mkdir -p build-web
        cp ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/PreVEngineExample.html build-web/
        cp ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/PreVEngineExample.js build-web/
        cp ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/PreVEngineExample.wasm build-web/
        cp ${{ steps.strings.outputs.build-output-dir }}/Examples/PreVEngineExample/PreVEngineExample.data build-web/

    - name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-web
        path: build-web
        retention-days: 7

    - name: Prepare Pages
      run: |
        mkdir -p public
        cp build-web/* public/
        cp public/PreVEngineExample.html public/index.html

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
